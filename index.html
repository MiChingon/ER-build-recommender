<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#d4af37" />

    <!--
      Content-Security-Policy: defensive baseline for a static SPA.
      - script-src includes Google Tag Manager (gtag.js loader) and allows
        inline JSON-LD + the Vite HMR client (dev only). The codebase has
        no eval/Function/dangerouslySetInnerHTML so 'unsafe-inline' here is
        a practical concession for inline JSON-LD + MUI / Emotion runtime.
      - style-src 'unsafe-inline' is required by MUI / Emotion CSS-in-JS.
      - img-src whitelists the fextralife wiki host where weapon, armor,
        talisman, and spell icons are hotlinked from.
      - connect-src covers Google Analytics beacons and the Vite dev HMR
        websocket. ws: is harmless in production (no dev server) but lets
        local development continue to work under the same policy.
    -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'none'; form-action 'self'; img-src 'self' data: https://eldenring.wiki.fextralife.com; script-src 'self' 'unsafe-inline' https://www.googletagmanager.com; connect-src 'self' ws: wss: https://www.google-analytics.com https://*.google-analytics.com https://*.analytics.google.com; style-src 'self' 'unsafe-inline'; font-src 'self' data:;"
    />

    <!-- Favicon: inline SVG so no extra file is needed; matches the in-app emblem. -->
    <link
      rel="icon"
      type="image/svg+xml"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Ccircle cx='32' cy='32' r='28' fill='%231a1714' stroke='%23d4af37' stroke-width='3'/%3E%3Cpath d='M32 12 L32 52 M12 32 L52 32 M19 19 L45 45 M45 19 L19 45' stroke='%23d4af37' stroke-width='2.5' stroke-linecap='round' fill='none'/%3E%3C/svg%3E"
    />

    <title>Tarnished Builds — Optimal Stats, AP, Status & Spells</title>
    <meta
      name="description"
      content="Plan an Elden Ring build with the best starting class, target Soul Level, and per-stat upgrade plan. Live AP, status build-up, Sorcery / Incant scaling, and suggested spells for every weapon + catalyst in your loadout."
    />
    <meta
      name="keywords"
      content="Elden Ring, build planner, build calculator, stat calculator, attack power, status buildup, sorcery scaling, incant scaling, soul level, starting class, weapon scaling, infusion, talisman, armor"
    />
    <meta name="author" content="Tarnished Builds" />
    <meta name="robots" content="index,follow" />
    <link rel="canonical" href="https://tarnishedbuilds.com/" />

    <!-- Open Graph (Facebook, Discord, Slack previews) -->
    <meta property="og:type" content="website" />
    <meta property="og:locale" content="en_US" />
    <meta property="og:site_name" content="Tarnished Builds" />
    <meta
      property="og:title"
      content="Tarnished Builds — Optimal Stats, AP, Status & Spells"
    />
    <meta
      property="og:description"
      content="Pick a starting class and a weapon loadout — get the optimal stat spread, attack power, status build-up, and a per-level upgrade plan you can download as PDF."
    />
    <meta property="og:url" content="https://tarnishedbuilds.com/" />
    <meta
      property="og:image"
      content="https://eldenring.wiki.fextralife.com/file/Elden-Ring/erdtree_elden_ring_wiki_guide.jpg"
    />
    <meta property="og:image:alt" content="The Erdtree from Elden Ring" />

    <!-- Twitter card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta
      name="twitter:title"
      content="Tarnished Builds — Optimal Stats, AP, Status & Spells"
    />
    <meta
      name="twitter:description"
      content="Plan an Elden Ring build with optimal stats, AP, status build-up, sorcery / incant scaling, and a per-level upgrade plan."
    />
    <meta
      name="twitter:image"
      content="https://eldenring.wiki.fextralife.com/file/Elden-Ring/erdtree_elden_ring_wiki_guide.jpg"
    />

    <!-- Structured data: WebApplication -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebApplication",
        "name": "Tarnished Builds",
        "applicationCategory": "GameApplication",
        "operatingSystem": "Web",
        "description": "Pick a starting class and a weapon loadout to see optimal stats, attack power, status build-up, and a per-level upgrade plan.",
        "offers": { "@type": "Offer", "price": "0", "priceCurrency": "USD" },
        "about": { "@type": "VideoGame", "name": "Elden Ring" }
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <noscript>
      <p>
        This Elden Ring build recommender needs JavaScript to compute optimal
        stats, attack power, and the per-level upgrade plan. Please enable
        JavaScript to continue.
      </p>
    </noscript>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
